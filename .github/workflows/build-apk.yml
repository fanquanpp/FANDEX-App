name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Lint
        working-directory: android
        run: ./gradlew lintDebug
        continue-on-error: true

  build-debug:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: fandex-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

  build-release:
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease
        env:
          FANDEX_KEYSTORE_PASSWORD: ${{ secrets.FANDEX_KEYSTORE_PASSWORD }}
          FANDEX_KEY_ALIAS: ${{ secrets.FANDEX_KEY_ALIAS }}
          FANDEX_KEY_PASSWORD: ${{ secrets.FANDEX_KEY_PASSWORD }}

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: fandex-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Read version
        id: version
        run: |
          VERSION=$(grep versionName android/app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: FANDEX-App v${{ steps.version.outputs.version }}
          body: |
            ## FANDEX-App v${{ steps.version.outputs.version }}

            ### 下载
            选择下方 APK 文件直接下载安装。

            ### 环境要求
            - Android 8.0 (API 26) 或更高版本
            - 允许"安装未知来源应用"权限

            ### 更新方式
            下载最新 APK 覆盖安装即可。
          files: android/app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: true
