name: Build & Release APK

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  # 代码检查 Job
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Run Lint
        working-directory: android
        run: ./gradlew lintDebug
        continue-on-error: true

  # Debug 构建 Job
  build-debug:
    runs-on: ubuntu-latest
    needs: lint
    if: "!startsWith(github.ref, 'refs/tags/v')"
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: fandex-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

  # Release 构建与发布 Job（仅在 Tag 推送时触发）
  build-release:
    runs-on: ubuntu-latest
    needs: lint
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # 从 Secrets 解码签名密钥库
      - name: Decode Keystore
        run: |
          echo "${{ secrets.FANDEX_KEYSTORE_BASE64 }}" | base64 -d > android/fandex-release.jks

      # 构建签名 Release APK
      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease
        env:
          FANDEX_KEYSTORE_PASSWORD: ${{ secrets.FANDEX_KEYSTORE_PASSWORD }}
          FANDEX_KEY_ALIAS: ${{ secrets.FANDEX_KEY_ALIAS }}
          FANDEX_KEY_PASSWORD: ${{ secrets.FANDEX_KEY_PASSWORD }}

      # 读取版本号
      - name: Read version
        id: version
        run: |
          VERSION=$(grep versionName android/app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # 重命名 APK 为规范文件名
      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/release/FANDEX-v${{ steps.version.outputs.version }}.apk FANDEX-v${{ steps.version.outputs.version }}.apk || true

      # 上传 Release APK 为 Artifact
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: fandex-release-apk
          path: FANDEX-v*.apk
          retention-days: 90

      # 创建 GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: FANDEX-App v${{ steps.version.outputs.version }}
          body: |
            ## FANDEX-App v${{ steps.version.outputs.version }}

            ### 下载
            选择下方 APK 文件直接下载安装。

            ### 环境要求
            - Android 8.0 (API 26) 或更高版本
            - 允许"安装未知来源应用"权限

            ### 更新方式
            下载最新 APK 覆盖安装即可。
          files: FANDEX-v*.apk
          draft: false
          prerelease: false
